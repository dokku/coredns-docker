---
name: "test"

# yamllint disable-line rule:truthy
on:
  pull_request:
    branches:
      - "*"
  push:
    branches:
      - "main"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go-test:
    name: go-test
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"
      - run: go get .
      - run: go test -v ./...

  e2e-test:
    name: e2e-test
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"
      - name: Install bats
        run: |
          git clone https://github.com/bats-core/bats-core.git /tmp/bats-core
          sudo /tmp/bats-core/install.sh /usr/local
      - name: Install dig
        run: sudo apt-get update && sudo apt-get install -y dnsutils
      - name: Run e2e tests
        run: make test-e2e

  integration-test:
    name: integration-test
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"
      - run: go get .
      - name: Run tests with coverage
        run: make coverage
      - name: Write coverage summary
        if: always()
        run: |
          if [ ! -f coverage.out ]; then
            echo "coverage.out not produced (test binary likely failed to compile)" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          total=$(go tool cover -func=coverage.out | tail -1 | awk '{print $NF}')
          {
            echo "## Test coverage: ${total}"
            echo ""
            echo '```'
            go tool cover -func=coverage.out
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Upload coverage profile
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-profile
          path: coverage.out
          retention-days: 7
