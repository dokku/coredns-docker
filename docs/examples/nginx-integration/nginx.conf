events {}

http {
    # Point nginx at CoreDNS running on the host. 172.28.0.1 is the gateway
    # of the custom bridge network defined in docker-compose.yml, which from
    # inside the nginx container is the host. CoreDNS on the host listens on
    # all interfaces by default, so it answers on this address too.
    #
    # valid=10s tells nginx how long to cache a resolved name before querying
    # again. Keep it low in development so container restarts surface quickly.
    resolver 172.28.0.1:1053 valid=10s ipv6=off;

    # Route /api/* to api.docker and everything else to web.docker. The `set`
    # step is critical: nginx only re-resolves names that come from a variable.
    # Using a bare `proxy_pass http://web.docker;` would resolve once at startup
    # and never again, defeating the whole point of using DNS.
    server {
        listen 80;
        server_name _;

        location /api/ {
            set $api_backend "http://api.docker";
            proxy_pass $api_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location / {
            set $web_backend "http://web.docker";
            proxy_pass $web_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
